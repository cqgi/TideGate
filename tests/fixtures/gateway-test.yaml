server:
  host: 127.0.0.1
  port: 8000
  sse_heartbeat_interval_s: 0.5
  auth_cache_size: 1024
  auth_cache_ttl_s: 60
  loop_lag_interval_s: 1.0
  config_poll_interval_s: 30.0
  provider_pool_drain_s: 0.1
  config_reload_backoff_initial_s: 0.1
  config_reload_backoff_max_s: 1.0
  cpu_pool_workers: 2

timeouts: { connect_s: 2.0, ttft_s: 10.0, inter_chunk_s: 15.0, total_s: 300.0 }

redis: { url: "redis://localhost:6379/0" }

providers:
  mock-a:
    type: openai_compatible
    base_url: http://127.0.0.1:9001/v1
    api_key_env: MOCK_A_KEY
    max_connections: 200
  mock-b:
    type: openai_compatible
    base_url: http://127.0.0.1:9002/v1
    api_key_env: MOCK_B_KEY
    max_connections: 200

model_groups:
  chat-large:
    deployments:
      - provider: mock-a
        upstream_model: mock-gpt-large
        weight: 1
        price_per_1k_input_usd: 0.0010
        price_per_1k_output_usd: 0.0020
        supports_logprobs: true
      - provider: mock-b
        upstream_model: mock-gpt-large
        weight: 1
        price_per_1k_input_usd: 0.0025
        price_per_1k_output_usd: 0.0050
        supports_logprobs: true
  chat-small:
    deployments:
      - provider: mock-a
        upstream_model: mock-gpt-small
        weight: 1
        price_per_1k_input_usd: 0.0003
        price_per_1k_output_usd: 0.0006
        supports_logprobs: true

routing:
  ewma_alpha: 0.5
  slow_call_ttft_slo_s: 0.15
  breaker:
    window_size: 4
    failure_rate_to_open: 0.5
    min_samples: 4
    open_cooldown_s: 0.5
    cooldown_max_s: 2.0
    half_open_probes: 1
  p2c_weights: { ttft: 0.4, error_rate: 0.3, inflight: 0.2, price: 0.1 }
  max_attempts_before_first_byte: 3
  agg_report_interval_s: 0.5
  agg_ttl_s: 60

policies:
  default:
    fallback_chain: [chat-large]
    degradation: { smaller_model_group: chat-small, stale_cache: true }
    hedging: { enabled: false }
    cascade: { enabled: false }

cache:
  l1: { ttl_s: 60, ttl_jitter_ratio: 0.0, max_value_bytes: 262144 }
  l2:
    similarity_threshold: 0.86
    stale_threshold_delta: 0.03
    max_temperature: 0.3
    index_capacity: 10000
    embedding_model: BAAI/bge-small-zh-v1.5
    embed_pool_workers: 1
    hf_endpoint: ""
    model_cache_dir: .cache/huggingface
    query_timeout_ms: 50
    store_timeout_ms: 500
    capacity_sweep_interval_s: 60
  volatile_intent_patterns: ["今天", "现在", "最新", "几点", "股价", "天气"]
  reject_patterns: ["无法回答", "作为AI", "抱歉"]
  replay_chunk_chars: 8
  replay_interval_ms: 1

quota_plans:
  free:
    rpm: 600
    tpm: 2000000
    concurrent_streams: 100
    monthly_budget_usd: 500
    fail_mode: closed
  open:
    rpm: 600
    tpm: 2000000
    concurrent_streams: 100
    monthly_budget_usd: 500
    fail_mode: open

tenants:
  - id: demo
    api_key_sha256: a69b1744aae71fddcefab5a490e09c9b51bcbe22fe74ffb5b91459c4cbb4e97b
    plan: free
    policy: default
    cache: { l1: true, l2: false }
